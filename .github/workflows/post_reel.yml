name: Post Instagram Reel

on:
  schedule:
    - cron: '50 8 * * *'   # 2:20 PM IST - TEST
    - cron: '30 5 * * *'   # 11:00 AM IST (UTC+5:30)
    - cron: '30 14 * * *'  # 8:00 PM IST
  workflow_dispatch:        # manual test ke liye

jobs:
  post-reel:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Post Reel
        env:
          IG_USER_ID:      ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: python poster.py

      - name: Save log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_log.json
          git diff --staged --quiet || git commit -m "log: reel posted"
          git push
